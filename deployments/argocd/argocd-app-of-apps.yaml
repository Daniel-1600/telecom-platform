apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telecom-platform-root
  namespace: argocd
  labels:
    app.kubernetes.io/name: telecom-platform-root
    app.kubernetes.io/component: gitops
    app.kubernetes.io/part-of: telecom-platform
spec:
  project: default
  source:
    repoURL: https://github.com/nutcas3/telecom-platform.git
    targetRevision: main
    path: deployments/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
