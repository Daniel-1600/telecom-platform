apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: telecom-platform-tls
  namespace: telecom-platform
  labels:
    app.kubernetes.io/name: telecom-platform-tls
    app.kubernetes.io/component: certificates
    app.kubernetes.io/part-of: telecom-platform
spec:
  secretName: telecom-platform-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - api.telecom.local
  - dashboard.telecom.local
  - grafana.telecom.local
  - prometheus.telecom.local
  - kibana.telecom.local
  - vault.telecom.local
---
