apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: telecom-platform-staging
resources:
- ../../kubernetes/00-namespace.yaml
- ../../kubernetes/01-mongodb.yaml
- ../../kubernetes/02-redis.yaml
- ../../kubernetes/03-api-server.yaml
- ../../kubernetes/04-charging-engine.yaml
- ../../kubernetes/manifests/
patchesStrategicMerge:
- api-server-staging-patch.yaml
- charging-engine-staging-patch.yaml
namespace: telecom-platform-staging
commonLabels:
  app.kubernetes.io/environment: staging
  app.kubernetes.io/managed-by: kustomize
configMapGenerator:
- name: telecom-platform-config
  literals:
  - LOG_LEVEL=info
  - ENVIRONMENT=staging
  - RATE_LIMIT_REQUESTS=500
  - RATE_LIMIT_WINDOW=60
  - METRICS_ENABLED=true
secretGenerator:
- name: telecom-platform-secrets
  literals:
  - DATABASE_URL=postgresql://postgres:staging123@postgres:5432/telecom_staging
  - REDIS_URL=redis://redis:6379
  - JWT_SECRET=staging-jwt-secret-key
replicas:
- name: api-server
  count: 2
- name: charging-engine
  count: 2
- name: packet-gateway
  count: 2
- name: web-dashboard
  count: 2
