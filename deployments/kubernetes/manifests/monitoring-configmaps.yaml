---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: telecom-monitoring
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'localhost:587'
      smtp_from: 'alerts@telecom.example.com'
    
    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'web.hook'
      routes:
      - match:
          severity: critical
        receiver: 'critical-alerts'
      - match:
          severity: warning
        receiver: 'warning-alerts'
    
    receivers:
    - name: 'web.hook'
      webhook_configs:
      - url: 'http://api-server-service:8000/webhooks/alertmanager'
        send_resolved: true
    - name: 'critical-alerts'
      webhook_configs:
      - url: 'http://api-server-service:8000/webhooks/critical-alerts'
        send_resolved: true
      email_configs:
      - to: 'admin@telecom.example.com'
        subject: '[CRITICAL] Telecom Platform Alert'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Labels: {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}
          {{ end }}
    - name: 'warning-alerts'
      webhook_configs:
      - url: 'http://api-server-service:8000/webhooks/warning-alerts'
        send_resolved: true
    
    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'instance']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: telecom-monitoring
data:
  datasources.yml: |
    apiVersion: 1
    
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true
      editable: true
    
    - name: InfluxDB
      type: influxdb
      access: proxy
      url: http://influxdb-service:8086
      database: telecom
      user: admin
      jsonData:
        version: Flux
        organization: telecom
        defaultBucket: telecom
        tlsSkipVerify: true
      secureJsonData:
        token: telecom-super-secret-auth-token
      editable: true
  
  dashboards.yml: |
    apiVersion: 1
    
    providers:
    - name: 'telecom-dashboards'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: telecom-monitoring
data:
  telecom-overview.json: |
