          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "telecom_subscribers_total",
              "interval": "",
              "legendFormat": "Total Subscribers",
              "refId": "A"
            }
          ],
          "title": "Total Subscribers",
          "type": "timeseries"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["telecom"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Telecom Platform Overview",
      "uid": "telecom-overview",
      "version": 1,
      "weekStart": ""
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: telecom-monitoring
data:
  alert_rules.yml: |
    groups:
    - name: telecom_alerts
      rules:
      - alert: HighErrorRate
        expr: rate(telecom_http_requests_total{status_code=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second"
      
      - alert: LowCreditBalance
        expr: telecom_credit_balance < 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Subscriber has low credit balance"
          description: "Subscriber {{ $labels.subscriber_id }} has balance {{ $value }}"
      
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Container {{ $labels.container }} memory usage is {{ $value }}%"
      
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "Container {{ $labels.container }} CPU usage is {{ $value }}%"
      
      - alert: DatabaseConnectionFailure
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection failure"
          description: "PostgreSQL database is down"
      
      - alert: RedisConnectionFailure
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis connection failure"
          description: "Redis cache is down"
      
      - alert: ChargingEngineDown
        expr: up{job="telecom-charging-engine"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Charging engine is down"
          description: "Rust charging engine service is not responding"
      
      - alert: PacketGatewayDown
        expr: up{job="telecom-packet-gateway"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Packet gateway is down"
          description: "eBPF packet gateway service is not responding"
