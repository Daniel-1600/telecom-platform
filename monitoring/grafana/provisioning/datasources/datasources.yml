apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: telecom
    user: admin
    password: password123
    jsonData:
      version: Flux
      organization: telecom
      defaultBucket: telecom
      tlsSkipVerify: true
    secureJsonData:
      token: telecom-super-secret-auth-token
    editable: true
